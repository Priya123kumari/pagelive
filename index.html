<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .calculator {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .screen {
      width: 100%;
      height: 60px;
      border: none;
      outline: none;
      text-align: right;
      padding: 10px;
      font-size: 24px;
      border-radius: 10px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 55px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      background: rgba(255,255,255,0.15);
      color: white;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .operator {
      background: #ff9500;
    }

    .equal {
      background: #34c759;
      grid-column: span 2;
    }

    .clear {
      background: #ff3b30;
      grid-column: span 2;
    }

  </style>
</head>

<body>

  <div class="calculator">
    <input type="text" id="screen" class="screen" readonly>

    <div class="buttons">
      <button class="clear" onclick="clearScreen()">AC</button>
      <button onclick="show('%')">%</button>
      <button class="operator" onclick="show('/')">÷</button>

      <button onclick="show('7')">7</button>
      <button onclick="show('8')">8</button>
      <button onclick="show('9')">9</button>
      <button class="operator" onclick="show('*')">×</button>

      <button onclick="show('4')">4</button>
      <button onclick="show('5')">5</button>
      <button onclick="show('6')">6</button>
      <button class="operator" onclick="show('-')">−</button>

      <button onclick="show('1')">1</button>
      <button onclick="show('2')">2</button>
      <button onclick="show('3')">3</button>
      <button class="operator" onclick="show('+')">+</button>

      <button onclick="show('0')">0</button>
      <button onclick="show('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    function show(value) {
      document.getElementById("screen").value += value;
    }

    function clearScreen() {
      document.getElementById("screen").value = "";
    }

    function calculate() {
      try {
        let x = document.getElementById("screen").value;
        document.getElementById("screen").value = eval(x);
      } catch {
        document.getElementById("screen").value = "Error";
      }
    }
  </script>

</body>
</html>
